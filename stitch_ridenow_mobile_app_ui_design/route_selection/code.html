<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-container {
            height: 100vh;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .ui-overlay {
            position: relative;
            z-index: 10;
            height: 100vh;
            pointer-events: none;
        }
        .ui-overlay > * {
            pointer-events: auto;
        }
        .bottom-sheet {
            box-shadow: 0px -4px 20px rgba(0,0,0,0.05);
        }
        .input-group::before {
            content: '';
            position: absolute;
            left: 27px;
            top: 40px;
            bottom: 40px;
            width: 2px;
            border-left: 2px dashed #cfc4c5;
            z-index: 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background antialiased">
<!-- Map Layer -->
<div class="map-container">
<img alt="Map Background" class="w-full h-full object-cover grayscale-[20%]" data-alt="A clean, minimalist high-angle map view of a sophisticated urban landscape with a clearly defined transit route. The map features desaturated tones with soft greys and whites, prioritizing clarity and premium aesthetic. A vibrant electric blue path connects two distinct points, cutting through a grid of modern city streets under bright, even daylight. The overall mood is precise and reliable, reflecting a high-end mobility service." data-location="Mumbai" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFOsvZWDSrhPj-1VgIzxxwxcQpvJvlEB0YOrpC42UnDnBNgEILmDRvyYBUJ5gM6XGF4kVsAi_KTIo9jA0HmLoncpIcxsKCPmz3n3x2TccYPppz0rO_cEzkOKP0WnmHCCCxxuY_W851XROyBFMKzlBLuxS7ii1UyEvD1g4yUBTI3K-EoSWkVxCXiiT49lDE9jOsDY_95n9YCEXZZl2YUj1nRS_6RdDrFoI8_1uf0ok5uk3in_mtFgjdj70GtbeWRFct1lYrpg3atWU">
</div>
<!-- UI Overlay -->
<div class="ui-overlay flex flex-col justify-between">
<!-- Top App Bar & Address Selection -->
<header class="p-margin-mobile pt-sm">
<nav class="flex items-center justify-between mb-lg">
<button class="w-10 h-10 flex items-center justify-center bg-surface rounded-full shadow-sm hover:scale-95 transition-transform active:bg-surface-variant">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="bg-surface px-md py-xs rounded-full shadow-sm">
<span class="font-label-md text-label-md text-primary">Route Preview</span>
</div>
<div class="w-10"></div> <!-- Spacer -->
</nav>
<div class="bg-surface rounded-xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.05)] input-group relative">
<!-- Pickup -->
<div class="flex items-center gap-md mb-md relative z-10">
<div class="w-6 h-6 flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-secondary ring-4 ring-secondary/20"></div>
</div>
<div class="flex-1">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Pickup</label>
<input class="w-full bg-surface-container-low border-none rounded-lg font-body-md text-body-md py-2 focus:ring-0" readonly="" type="text" value="Oberoi Commerz II, Mumbai">
</div>
</div>
<!-- Drop-off -->
<div class="flex items-center gap-md relative z-10">
<div class="w-6 h-6 flex items-center justify-center">
<div class="w-3 h-3 bg-primary"></div>
</div>
<div class="flex-1">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Drop-off</label>
<input class="w-full bg-surface-container-low border-none rounded-lg font-body-md text-body-md py-2 focus:ring-0" readonly="" type="text" value="Chhatrapati Shivaji International Airport">
</div>
<button class="w-8 h-8 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">add_circle</span>
</button>
</div>
</div>
</header>
<!-- Bottom Sheet -->
<div class="bottom-sheet bg-surface rounded-t-xl p-margin-mobile pb-xl">
<!-- Pull Bar -->
<div class="w-12 h-1 bg-surface-variant rounded-full mx-auto mb-lg"></div>
<div class="flex items-center justify-between mb-lg">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Estimated Time</span>
<span class="font-headline-md text-headline-md text-primary">24 mins</span>
</div>
<div class="flex flex-col items-end">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Est. Fare</span>
<span class="font-headline-md text-headline-md text-primary">₹542.00</span>
</div>
</div>
<!-- Promo Row -->
<div class="flex items-center justify-between bg-surface-container-low p-md rounded-xl mb-xl hover:bg-surface-container hover:cursor-pointer transition-colors group">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary">confirmation_number</span>
<span class="font-body-md text-body-md text-on-surface">Apply Promo Code</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-lg rounded-xl font-button-lg text-button-lg shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
                Continue to Booking
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<!-- Navigation Shell (BottomNavBar Mapping) -->
