<!-- Navigation suppressed for transactional screen flow as per mandate -->
<script>
        // Micro-interaction for ride selection
        const rideButtons = document.querySelectorAll('button.flex.items-center.justify-between');
        rideButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                rideButtons.forEach(b => {
                    b.classList.remove('border-2', 'border-secondary', 'bg-surface-container-lowest', 'shadow-md', 'ring-4', 'ring-secondary/5', 'scale-[1.02]');
                    b.classList.add('hover:bg-surface-container-low');
                    
                    // Reset internal icons/labels
                    const iconBox = b.querySelector('.w-14.h-14');
                    const iconSpan = b.querySelector('.material-symbols-outlined');
                    const labelSpan = b.querySelector('.text-label-md');
                    
                    if(iconBox) iconBox.classList.remove('bg-secondary-fixed');
                    if(iconBox) iconBox.classList.add('bg-surface-container');
                    if(iconSpan) iconSpan.classList.remove('text-secondary');
                    if(iconSpan) iconSpan.classList.add('text-on-surface-variant');
                    if(labelSpan) labelSpan.classList.remove('text-secondary', 'bg-secondary-fixed');
                    if(labelSpan) labelSpan.classList.add('text-on-surface-variant', 'bg-surface-container');
                });
                
                btn.classList.add('border-2', 'border-secondary', 'bg-surface-container-lowest', 'shadow-md', 'ring-4', 'ring-secondary/5', 'scale-[1.02]');
                btn.classList.remove('hover:bg-surface-container-low');
                
                const iconBox = btn.querySelector('.w-14.h-14');
                const iconSpan = btn.querySelector('.material-symbols-outlined');
                const labelSpan = btn.querySelector('.text-label-md');
                
                if(iconBox) iconBox.classList.add('bg-secondary-fixed');
                if(iconBox) iconBox.classList.remove('bg-surface-container');
                if(iconSpan) iconSpan.classList.add('text-secondary');
                if(iconSpan) iconSpan.classList.remove('text-on-surface-variant');
                if(labelSpan) labelSpan.classList.add('text-secondary', 'bg-secondary-fixed');
                if(labelSpan) labelSpan.classList.remove('text-on-surface-variant', 'bg-surface-container');
            });
        });
    </script>
