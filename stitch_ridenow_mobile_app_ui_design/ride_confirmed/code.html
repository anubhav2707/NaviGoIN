<!-- JavaScript for Micro-interactions -->
<script>
    // Car movement simulation
    const carMarker = document.getElementById('car-marker');
    const positions = [
      { top: '550px', left: '210px', rotate: '5deg' },
      { top: '500px', left: '220px', rotate: '-10deg' },
      { top: '450px', left: '190px', rotate: '-25deg' },
      { top: '400px', left: '180px', rotate: '-5deg' },
      { top: '350px', left: '180px', rotate: '0deg' }
    ];
    
    let currentPos = 0;
    function moveCar() {
      if (currentPos < positions.length) {
        const pos = positions[currentPos];
        carMarker.style.top = pos.top;
        carMarker.style.left = pos.left;
        carMarker.style.transform = `translate(-50%, -50%) rotate(${pos.rotate})`;
        currentPos++;
        setTimeout(moveCar, 5000); // Move every 5 seconds
      }
    }
    
    window.onload = () => {
      setTimeout(moveCar, 2000);
    };

    // Button active states
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('touchstart', () => btn.classList.add('scale-95'));
      btn.addEventListener('touchend', () => btn.classList.remove('scale-95'));
    });
  </script>
