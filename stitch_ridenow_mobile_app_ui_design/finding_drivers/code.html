<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Finding Drivers - RideNow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.33); opacity: 0.8; }
            80%, 100% { opacity: 0; }
        }
        
        @keyframes pulse-dot {
            0% { transform: scale(0.8); opacity: 1; }
            50% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(0.8); opacity: 1; }
        }

        .pulse-container {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #0040df;
            border-radius: 50%;
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .pulse-dot {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background-color: #000000;
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .progress-bar-shine {
            background: linear-gradient(90deg, #0040df 0%, #2d5bff 50%, #0040df 100%);
            background-size: 200% 100%;
            animation: shine 1.5s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .bottom-sheet-drag-handle {
            width: 36px;
            height: 4px;
            background-color: #e2e2e2;
            border-radius: 2px;
            margin: 8px auto;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#dde1ff",
                        "surface-tint": "#5e5e5e",
                        "tertiary-container": "#1c1b1b",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "inverse-surface": "#2f3131",
                        "surface-container-high": "#e8e8e8",
                        "on-tertiary-fixed": "#1c1b1b",
                        "primary-container": "#1b1b1b",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#c6c6c6",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#1b1b1b",
                        "tertiary-fixed": "#e5e2e1",
                        "tertiary": "#000000",
                        "on-tertiary-fixed-variant": "#474646",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f9f9f9",
                        "surface-variant": "#e2e2e2",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#efefff",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#eeeeee",
                        "surface-dim": "#dadada",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary-fixed": "#001355",
                        "background": "#f9f9f9",
                        "inverse-on-surface": "#f1f1f1",
                        "secondary-container": "#2d5bff",
                        "on-error": "#ffffff",
                        "on-surface": "#1a1c1c",
                        "on-background": "#1a1c1c",
                        "outline-variant": "#cfc4c5",
                        "primary-fixed": "#e2e2e2",
                        "on-tertiary-container": "#858383",
                        "on-secondary-fixed-variant": "#0035bd",
                        "on-primary-fixed-variant": "#474747",
                        "secondary": "#0040df",
                        "on-surface-variant": "#4c4546",
                        "primary": "#000000",
                        "surface-container-highest": "#e2e2e2"
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-background text-on-background min-h-screen">
    <div class="max-w-sm mx-auto bg-surface min-h-screen flex flex-col items-center justify-center">
        <!-- Header with Cancel -->
        <div class="absolute top-0 left-0 right-0 p-4 bg-surface/95 backdrop-blur-sm">
            <button class="text-on-surface-variant hover:text-on-surface transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <!-- Main Content -->
        <div class="flex flex-col items-center justify-center flex-1 px-6">
            <!-- Pulse Animation Container -->
            <div class="pulse-container mb-8">
                <div class="pulse-ring"></div>
                <div class="pulse-ring" style="animation-delay: -0.5s"></div>
                <div class="pulse-ring" style="animation-delay: -1s"></div>
                <div class="pulse-ring" style="animation-delay: -1.5s"></div>
                <div class="pulse-dot"></div>
            </div>

            <!-- Text Content -->
            <h1 class="text-2xl font-bold text-on-surface mb-2">Finding drivers near you</h1>
            <p class="text-on-surface-variant text-center mb-8">This may take a few moments</p>

            <!-- Progress Bar -->
            <div class="w-full max-w-xs bg-surface-variant rounded-full h-2 overflow-hidden">
                <div class="progress-bar-shine h-full w-1/3 rounded-full"></div>
            </div>
        </div>

        <!-- Bottom Sheet (Hidden by default) -->
        <div class="absolute bottom-0 left-0 right-0 bg-surface rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300 ease-out">
            <div class="bottom-sheet-drag-handle"></div>
            <div class="p-6">
                <div class="flex items-center mb-4">
                    <div class="w-12 h-12 bg-surface-variant rounded-full mr-4"></div>
                    <div class="flex-1">
                        <h3 class="font-semibold text-on-surface">Driver Name</h3>
                        <p class="text-sm text-on-surface-variant">Vehicle Details</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-on-surface-variant">ETA</p>
                        <p class="font-semibold text-on-surface">2 min</p>
                    </div>
                </div>
                <button class="w-full bg-primary text-on-primary py-3 rounded-xl font-semibold hover:bg-primary-container hover:text-on-primary-container transition-colors">
                    View Details
                </button>
            </div>
        </div>
    </div>
</body>
</html>
